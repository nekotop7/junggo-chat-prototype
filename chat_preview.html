<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>중고나라 채팅 - TK_채팅_00_첫진입</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      background: #fff;
      font-family: 'Pretendard', -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: stretch
    }

    /* ─── 앱 래퍼: 360px 기본, 반응형 ─── */
    .app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #fff;
      margin: 0 auto;
      position: relative;
    }

    /* 480px 이상 데스크탑에서 가운데 + 좌우 그림자 */
    @media(min-width:481px) {
      body {
        background: #F5F5F5
      }

      .app {
        box-shadow: 0 0 20px rgba(0, 0, 0, .08)
      }
    }

    /* ─── 상태바 (모바일에서는 OS가 그려주므로 숨김 가능) ─── */
    .statusbar {
      height: env(safe-area-inset-top, 0px);
      min-height: 0;
      background: #fff;
      flex-shrink: 0;
    }

    /* 데스크탑/웹 미리보기에서는 상태바 표시 */
    @media(min-width:481px) {
      .statusbar {
        min-height: 36px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px
      }

      .statusbar .time {
        font-size: 14px;
        font-weight: 600;
        color: #141313
      }

      .statusbar .icons {
        display: flex;
        gap: 6px;
        align-items: center
      }
    }

    @media(max-width:480px) {

      .statusbar .time,
      .statusbar .icons {
        display: none
      }
    }

    /* ─── topbar 56px ─── */
    .topbar {
      height: 56px;
      background: #fff;
      display: flex;
      align-items: center;
      padding: 8px 12px;
      flex-shrink: 0;
      gap: 8px
    }

    .topbar-inner {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 40px
    }

    .topbar .left-area {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0
    }

    .topbar .center-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 40px;
      overflow: hidden
    }

    .topbar .name-row {
      display: flex;
      align-items: center;
      gap: 4px
    }

    .topbar .name {
      font-size: 16px;
      font-weight: 700;
      color: #141313;
      letter-spacing: -.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .topbar .sub {
      font-size: 13px;
      font-weight: 400;
      color: #59616B;
      white-space: nowrap
    }

    .topbar .right-area {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0
    }

    /* ─── 상품바 56px ─── */
    .productbar {
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #F1F4F6;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0
    }

    .productbar .thumb {
      width: 32px;
      height: 32px;
      background: #E0E0E0;
      border-radius: 4px;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .productbar .pinfo {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .productbar .pname {
      font-size: 13px;
      font-weight: 400;
      color: #59616B;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .productbar .price-row {
      display: flex;
      align-items: center;
      gap: 4px
    }

    .productbar .price {
      font-size: 15px;
      font-weight: 700;
      color: #141313
    }

    .productbar .ship-badge {
      background: #EFEFEF;
      border-radius: 2px;
      padding: 1px 4px;
      font-size: 11px;
      font-weight: 500;
      color: #141313;
      white-space: nowrap
    }

    .productbar .buybtn {
      height: 32px;
      padding: 0 12px;
      background: #000000;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .15s
    }

    .productbar .buybtn:active {
      opacity: .7
    }

    /* ─── 안심결제 배너 ─── */
    .banner {
      position: sticky;
      top: 10px;
      z-index: 10;
      font-weight: 200;
      margin: 10px 10px 0;
      background: #E4F8E8;
      border: 1px solid #CBE8D1;
      border-radius: 8px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    /* 축소된 상태 (Scroll-Shrink) */
    .banner.shrunk {
      width: 36px;
      height: 36px;
      padding: 0;
      margin-left: auto;
      margin-right: 16px;
      border-radius: 50%;
      background: #009F1F;
      border: none;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(0, 159, 31, 0.3);
    }

    .banner.shrunk .txt,
    .banner.shrunk .chevron {
      display: none;
    }

    .banner.shrunk .dot {
      background: none;
      width: 20px;
      height: 20px;
    }

    .banner.shrunk .dot svg {
      width: 14px;
      height: 14px;
      stroke-width: 3;
    }

    .banner .dot {
      width: 18px;
      height: 18px;
      background: #009F1F;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .banner .txt {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .banner .txt .g {
      color: #009F1F
    }

    .banner .txt .d {
      color: #141313
    }

    .banner .chevron {
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center
    }

    /* ─── 채팅 영역 ─── */
    .chatarea {
      flex: 1;
      background: #fff;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 0;
      -webkit-overflow-scrolling: touch
    }

    .chatarea::-webkit-scrollbar {
      display: none
    }

    .chatarea {
      scrollbar-width: none
    }

    .chatarea .msglist {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px 16px;
      margin-top: auto
    }

    .bw {
      display: flex
    }

    .bw.s {
      justify-content: flex-end
    }

    .bw.r {
      justify-content: flex-start
    }

    .bb {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      word-break: break-word;
      animation: pop .2s ease;
      position: relative;
    }

    .bb.s {
      background: #373D44;
      color: #fff;
    }

    .bb.r {
      background: #F2F3F5;
      color: #141313;
    }

    /* ─── 퀵 제안 칩 ─── */
    .qchips {
      padding: 0 12px;
      height: 32px;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch
    }

    .qchips::-webkit-scrollbar {
      display: none
    }

    .qc {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #DADEE5;
      border-radius: 40px;
      padding: 0 12px;
      height: 32px;
      background: #fff;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 500;
      color: #141313;
      transition: background .12s;
      flex-shrink: 0;
      gap: 2px
    }

    .qc:active {
      background: #EBEDEF
    }

    /* ─── 입력창 ─── */
    .inputarea {
      background: #fff;
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom))
    }

    .toucharea {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0
    }

    .inputwrap {
      flex: 1;
      height: 38px;
      background: #F1F4F6;
      border-radius: 25px;
      display: flex;
      align-items: center;
      padding: 0 8px 0 16px;
      border: 1.5px solid transparent;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .inputwrap:focus-within {
      background: #fff;
      border-color: #2C82FF;
    }

    .inputbox {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      color: #141313;
      padding: 0;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 38px;
      height: 38px
    }

    .inputbox::placeholder {
      color: #9CA3AF;
      font-size: 14px
    }

    /* 전송 버튼: 활성=녹색, 비활성=녹색 30% 투명도 */
    .sendbtn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity .15s, transform 0.1s;
      flex-shrink: 0;
      background: #009F1F;
      opacity: 0.3;
      pointer-events: none;
    }

    .sendbtn.active {
      opacity: 1;
      pointer-events: auto;
    }

    .sendbtn:active {
      transform: scale(0.92);
    }

    /* ─── 하단 네비 ─── */
    .bnav {
      height: 48px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px)
    }

    .bnav .ni {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    /* 모바일 실기기에서는 OS 네비가 있으므로 숨김 */
    @media(max-width:480px) {
      .bnav {
        display: none
      }
    }

    /* ─── 반응형: 작은 화면 ─── */
    @media(max-width:320px) {
      .topbar .center-area {
        padding: 0 20px
      }

      .topbar .name {
        font-size: 15px
      }

      .productbar {
        padding: 0 12px;
        gap: 8px
      }

      .productbar .price {
        font-size: 14px
      }
    }

    /* ─── 반응형: 태블릿 ─── */
    @media(min-width:768px) {
      .app {
        max-width: 420px
      }
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(.95)translateY(4px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- 상태바 (웹 미리보기용, 모바일에선 OS가 처리) -->
    <div class="statusbar">
      <span class="time">9:41</span>
      <div class="icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="#141313">
          <path
            d="M8 1C5.25 1 2.7 2 .7 3.7l1.3 1.5C3.7 3.6 5.75 2.8 8 2.8s4.3.8 6 2.4l1.3-1.5C13.3 2 10.75 1 8 1zm0 4.4c-1.65 0-3.15.65-4.25 1.7L5.1 8.5C5.9 7.75 6.9 7.3 8 7.3s2.1.45 2.9 1.2l1.35-1.4C11.15 6.05 9.65 5.4 8 5.4zM8 9.8c-.85 0-1.55.55-1.85 1.2L8 13l1.85-2C9.55 10.35 8.85 9.8 8 9.8z" />
        </svg>
        <svg width="14" height="12" viewBox="0 0 14 12" fill="#141313">
          <path d="M0 4h2v8H0zm3-1h2v9H3zM6 5h2v7H6zm3-3h2v10H9zm3-2h2v11h-2z" />
        </svg>
        <svg width="24" height="11" viewBox="0 0 25 12" fill="none">
          <rect x=".5" y=".5" width="21" height="11" rx="2.5" stroke="#141313" stroke-opacity=".35" />
          <rect x="2" y="2" width="18" height="8" rx="1.5" fill="#141313" />
          <path d="M23 4v4c1-.3 2-1.2 2-2s-1-1.7-2-2z" fill="#141313" fill-opacity=".4" />
        </svg>
      </div>
    </div>

    <!-- topbar -->
    <div class="topbar">
      <div class="topbar-inner">
        <div class="left-area">
          <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
            <path d="M9 1L1 9l8 8" stroke="#141313" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div class="center-area">
          <div class="name-row">
            <span class="name">배부른오리와둥댕이는</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="#141313" stroke-width="1.8" />
              <path d="M8 10l4 4 4-4" stroke="#141313" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </div>
          <div class="sub">보통 3시간 이내 응답</div>
        </div>
        <div class="right-area">
          <svg width="4" height="18" viewBox="0 0 4 18" fill="#141313">
            <circle cx="2" cy="2" r="1.6" />
            <circle cx="2" cy="9" r="1.6" />
            <circle cx="2" cy="16" r="1.6" />
          </svg>
        </div>
      </div>
    </div>

    <!-- 상품 정보 바 -->
    <div class="productbar">
      <div class="thumb">
        <img src="img/Product_img.png" alt="상품 이미지" style="width:100%;height:100%;object-fit:cover;">
      </div>
      <div class="pinfo">
        <div class="pname">애플 아이폰12미니 MINI 실버 새상...</div>
        <div class="price-row">
          <span class="price">880,000원</span>
          <span class="ship-badge">무료배송</span>
        </div>
      </div>
      <button class="buybtn">구매하기</button>
    </div>

    <!-- 안심결제 배너 -->
    <div class="banner" id="trustBanner">
      <div class="dot">
        <img src="img/conerstone.svg" alt="안심결제" style="width:100%;height:100%;object-fit:contain;">
      </div>
      <div class="txt"><span class="g">안심결제</span> <span class="d">쓰고 사기 걱정 없는 중고거래를 권장합니다.</span></div>
      <div class="chevron" onclick="document.getElementById('trustBanner').style.display='none'">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 6l4 4 4-4" stroke="#009F1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
    </div>

    <!-- 채팅 영역 -->
    <div class="chatarea" id="chatArea">
      <div class="msglist" id="msgList"></div>
    </div>

    <!-- 퀵 제안 칩 -->
    <div class="qchips">
      <div class="qc" onclick="sendQ(this)">안녕하세요</div>
      <div class="qc" onclick="sendQ(this)">📦 이 상품 관련 문의 드립니다</div>
      <div class="qc" onclick="sendQ(this)">지금 거래 되나요?</div>
    </div>

    <!-- 입력창 -->
    <div class="inputarea">
      <div class="toucharea">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5"
          stroke-linecap="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="7" x2="12" y2="17" />
          <line x1="7" y1="12" x2="17" y2="12" />
        </svg>
      </div>
      <div class="inputwrap">
        <textarea class="inputbox" id="inp" rows="1" placeholder="대화를 해볼까요?" oninput="onI(this)"></textarea>
        <div class="toucharea" style="width:28px;height:28px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5"
            stroke-linecap="round">
            <circle cx="12" cy="12" r="10" />
            <path d="M8 14s1.5 2 4 2 4-2 4-2" />
            <circle cx="9" cy="9" r=".8" fill="#9CA3AF" stroke="none" />
            <circle cx="15" cy="9" r=".8" fill="#9CA3AF" stroke="none" />
          </svg>
        </div>
      </div>
      <div class="toucharea">
        <button class="sendbtn" id="sBtn" onclick="doS()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 12V2M3 6l4-4 4 4" stroke="#fff" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>
    </div>

    <!-- 하단 OS 네비게이션 (웹 미리보기용) -->
    <div class="bnav">
      <div class="ni">
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="#96A0AB" stroke-width="2"
          stroke-linecap="round">
          <line x1="3" y1="1" x2="3" y2="13" />
          <line x1="9" y1="1" x2="9" y2="13" />
          <line x1="15" y1="1" x2="15" y2="13" />
        </svg>
      </div>
      <div class="ni">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#96A0AB" stroke-width="1.6">
          <rect x="1" y="1" width="14" height="14" rx="3" />
        </svg>
      </div>
      <div class="ni">
        <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
          <path d="M9 1L1 9l8 8" stroke="#96A0AB" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
    </div>

  </div>

  <script>
    const inp = document.getElementById('inp'), sBtn = document.getElementById('sBtn'), ml = document.getElementById('msgList'), ca = document.getElementById('chatArea');

    function onI(e) {
      const hasText = e.value.trim().length > 0;
      if (hasText) {
        sBtn.classList.add('active');
      } else {
        sBtn.classList.remove('active');
      }
      // Auto-resize height if needed (optional but good for UX)
    }

    function doS() {
      const t = inp.value.trim();
      if (!t) return;
      add(t, 's');
      inp.value = '';
      sBtn.classList.remove('active');
      ca.scrollTop = ca.scrollHeight;
      setTimeout(() => add('안녕하세요 😊 해당 상품 관련하여 문의해 주셨군요!', 'r'), 900);
    }

    // 퀵 칩 클릭 시: 바로 채팅 메시지로 전송
    function sendQ(e) {
      const text = e.textContent.replace('📦 ', '').trim();
      add(text, 's');
      ca.scrollTop = ca.scrollHeight;
      setTimeout(() => add('안녕하세요 😊 해당 상품 관련하여 문의해 주셨군요!', 'r'), 900);
    }

    function add(t, c) {
      const w = document.createElement('div'); w.className = 'bw ' + c;
      const b = document.createElement('div'); b.className = 'bb ' + c;
      b.textContent = t; w.appendChild(b); ml.appendChild(w);
      setTimeout(() => { ca.scrollTop = ca.scrollHeight; }, 50);
    }

    ca.addEventListener('scroll', () => {
      const banner = document.getElementById('trustBanner');
      if (ca.scrollTop > 30) {
        banner.classList.add('shrunk');
      } else {
        banner.classList.remove('shrunk');
      }
    });

    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doS() } });
  </script>
</body>

</html>
