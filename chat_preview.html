<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>중고나라 채팅 - TK_채팅_00_첫진입</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Sans KR', -apple-system, sans-serif
    }

    .phone {
      width: 360px;
      height: 800px;
      background: #fff;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0, 0, 0, .6), 0 0 0 2px #333;
      display: flex;
      flex-direction: column
    }

    /* ─── Top Navigation 360x36 ─── */
    .statusbar {
      height: 36px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0
    }

    .statusbar .time {
      font-size: 14px;
      font-weight: 600;
      color: #141313
    }

    .statusbar .icons {
      display: flex;
      gap: 6px;
      align-items: center
    }

    /* ─── topbar 360x56, fill=#ffffff, pad=[12,12,8,8], gap=8, cross=CENTER ─── */
    .topbar {
      height: 56px;
      background: #fff;
      display: flex;
      align-items: center;
      padding: 8px 12px;
      flex-shrink: 0;
      gap: 8px
    }

    /* TopBar 336x40, HORIZONTAL, cross=CENTER, gap=8 */
    .topbar-inner {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 40px
    }

    /* Left Area 0x40 — chevron_left icon only */
    .topbar .left-area {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0
    }

    /* topbar/resource/centerarea 320x40, VERTICAL, pad=[40,40,_,_], main=CENTER, cross=CENTER */
    .topbar .center-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 40px
    }

    /* Frame 723545 — seller name row HORIZONTAL */
    .topbar .name-row {
      display: flex;
      align-items: center;
      gap: 4px
    }

    /* 배부른오리와둥댕이는 fill=#141313 font=16/700 */
    .topbar .name {
      font-size: 16px;
      font-weight: 700;
      color: #141313;
      letter-spacing: -.3px;
      white-space: nowrap
    }

    /* 보통 3시간 이내 응답 fill=#59616b font=13/400 */
    .topbar .sub {
      font-size: 13px;
      font-weight: 400;
      color: #59616B;
      margin-top: 0;
      white-space: nowrap
    }

    /* Right Area — more icon */
    .topbar .right-area {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0
    }

    /* ─── Frame 2147224474 (상품바) 360x56, fill=#ffffff, stroke=#f1f4f6, HORIZONTAL, pad=[20,20,_,_], cross=CENTER, gap=12 ─── */
    .productbar {
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #F1F4F6;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0
    }

    /* image/item 32x32, r=4 */
    .productbar .thumb {
      width: 32px;
      height: 32px;
      background: #E0E0E0;
      border-radius: 4px;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center
    }

    /* Frame 2147224475 195x38, VERTICAL, gap=4 */
    .productbar .pinfo {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    /* product_name fill=#59616b font=13/400 */
    .productbar .pname {
      font-size: 13px;
      font-weight: 400;
      color: #59616B;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    /* Frame 2147224476 195x18, HORIZONTAL, cross=CENTER, gap=4 */
    .productbar .price-row {
      display: flex;
      align-items: center;
      gap: 4px
    }

    /* product_price fill=#141313 font=15/700 */
    .productbar .price {
      font-size: 15px;
      font-weight: 700;
      color: #141313
    }

    /* badge/goods fill=#efefef, 무료배송 fill=#141313 font=11/500 */
    .productbar .ship-badge {
      background: #EFEFEF;
      border-radius: 2px;
      padding: 1px 4px;
      font-size: 11px;
      font-weight: 500;
      color: #141313;
      white-space: nowrap
    }

    /* chips/suggestion fill=#000000 r=4, HORIZONTAL, pad=[12,12], main=CENTER cross=CENTER gap=2 */
    .productbar .buybtn {
      height: 32px;
      padding: 0 12px;
      background: #000000;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .15s
    }

    .productbar .buybtn:hover {
      opacity: .85
    }

    /* ─── Banner/Floating 344x38, fill=#e4f8e8, stroke=#cbe8d1, r=8, HORIZONTAL, pad=[16,16,10,10], gap=6 ─── */
    .banner {
      margin: 0 8px;
      margin-top: 0;
      background: #E4F8E8;
      border: 1px solid #CBE8D1;
      border-radius: 8px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      overflow: hidden
    }

    /* icon/system/conerstone 16x16, fill=#009f1f, r=16 */
    .banner .dot {
      width: 18px;
      height: 18px;
      background: #009F1F;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    /* Group 723544 — text area */
    .banner .txt {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .banner .txt .g {
      color: #009F1F
    }

    .banner .txt .d {
      color: #141313
    }

    /* icon/system/chevron_down 16x16, Shape fill=#009f1f */
    .banner .chevron {
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center
    }

    /* ─── 채팅 영역 (빈 화면) ─── */
    .chatarea {
      flex: 1;
      background: #fff;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 0
    }

    .chatarea::-webkit-scrollbar {
      display: none
    }

    .chatarea .msglist {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px 16px;
      margin-top: auto
    }

    .bw {
      display: flex
    }

    .bw.s {
      justify-content: flex-end
    }

    .bw.r {
      justify-content: flex-start
    }

    .bb {
      max-width: 72%;
      padding: 9px 14px;
      border-radius: 18px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
      word-break: break-word;
      animation: pop .15s ease
    }

    .bb.s {
      background: #2C82FF;
      color: #fff;
      border-bottom-right-radius: 4px
    }

    .bb.r {
      background: #F1F4F6;
      color: #141313;
      border-bottom-left-radius: 4px
    }

    /* ─── 채팅 하단 퀵메뉴 360x32, HORIZONTAL, pad=[12,12,_,_], cross=CENTER, gap=4 ─── */
    .qchips {
      padding: 0 12px;
      height: 32px;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none
    }

    .qchips::-webkit-scrollbar {
      display: none
    }

    /* chips/suggestion fill=#ffffff stroke=#dadee5 r=40, HORIZONTAL, pad=[12,12], main=CENTER cross=CENTER gap=2, Chip font=12/500 fill=#141313 */
    .qc {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #DADEE5;
      border-radius: 40px;
      padding: 0 12px;
      height: 32px;
      background: #fff;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 500;
      color: #141313;
      transition: background .12s;
      flex-shrink: 0;
      gap: 2px
    }

    .qc:hover {
      background: #F5F7F8
    }

    /* ─── CTA: Input/Chat 360x56, fill=#ffffff, HORIZONTAL, pad=[8,8,8,8], cross=CENTER ─── */
    .inputarea {
      background: #fff;
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      height: 56px
    }

    /* Touch Area 40x40 */
    .inputarea .toucharea {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0
    }

    /* InputBox 264x38, fill=#f1f4f6, r=25, HORIZONTAL, pad=[16,8,10,10], cross=CENTER */
    .inputwrap {
      flex: 1;
      height: 38px;
      background: #F1F4F6;
      border-radius: 25px;
      display: flex;
      align-items: center;
      padding: 0 8px 0 16px
    }

    .inputbox {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      color: #141313;
      padding: 0;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 38px;
      height: 38px
    }

    .inputbox::placeholder {
      color: #9CA3AF;
      font-size: 14px
    }

    /* Send icon/system/send: FRAME 28x28
   Active: Shape(BOOLEAN_OPERATION fill=#ffffff) = white circle bg, Union(fill=#009f1f) = green arrow
   Inactive: Shape(fill=#009f1f, Ellipse fill=#dadee5) = gray circle, Union fill=#ffffff = white arrow */
    .sendbtn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0
    }

    .sendbtn.active {
      background: #009F1F
    }

    .sendbtn.active svg path {
      stroke: #fff
    }

    .sendbtn.inactive {
      background: #DADEE5;
      cursor: default
    }

    .sendbtn.inactive svg path {
      stroke: #fff
    }

    /* ─── OS UI-Bottom Navigation 360x48, fill=#ffffff ─── */
    .bnav {
      height: 48px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-shrink: 0
    }

    .bnav .ni {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(.9)translateY(4px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }
  </style>
</head>

<body>
  <div class="phone">

    <!-- Top Navigation 360x36 OS UI-Status Bar -->
    <div class="statusbar">
      <span class="time">9:41</span>
      <div class="icons">
        <!-- Wi-Fi -->
        <svg width="16" height="12" viewBox="0 0 16 12" fill="#141313">
          <path
            d="M8 1C5.25 1 2.7 2 .7 3.7l1.3 1.5C3.7 3.6 5.75 2.8 8 2.8s4.3.8 6 2.4l1.3-1.5C13.3 2 10.75 1 8 1zm0 4.4c-1.65 0-3.15.65-4.25 1.7L5.1 8.5C5.9 7.75 6.9 7.3 8 7.3s2.1.45 2.9 1.2l1.35-1.4C11.15 6.05 9.65 5.4 8 5.4zM8 9.8c-.85 0-1.55.55-1.85 1.2L8 13l1.85-2C9.55 10.35 8.85 9.8 8 9.8z" />
        </svg>
        <!-- Cellular -->
        <svg width="14" height="12" viewBox="0 0 14 12" fill="#141313">
          <path d="M0 4h2v8H0zm3-1h2v9H3zM6 5h2v7H6zm3-3h2v10H9zm3-2h2v12h-2z" />
        </svg>
        <!-- Battery -->
        <svg width="24" height="11" viewBox="0 0 25 12" fill="none">
          <rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="#141313" stroke-opacity=".35" />
          <rect x="2" y="2" width="18" height="8" rx="1.5" fill="#141313" />
          <path d="M23 4v4c1-.3 2-1.2 2-2s-1-1.7-2-2z" fill="#141313" fill-opacity=".4" />
        </svg>
      </div>
    </div>

    <!-- topbar 360x56 -->
    <div class="topbar">
      <div class="topbar-inner">
        <!-- Left Area: chevron_left -->
        <div class="left-area">
          <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
            <path d="M9 1L1 9l8 8" stroke="#141313" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <!-- topbar/resource/centerarea: VERTICAL, pad=[40,40], main=CENTER cross=CENTER -->
        <div class="center-area">
          <!-- Frame 723545: name + icon -->
          <div class="name-row">
            <span class="name">배부른오리와둥댕이는</span>
            <!-- Group 723546 16x16: circle icon (timer/clock) — Shape fill=#000000 -->
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="7" stroke="#141313" stroke-width="1.2" />
              <polyline points="8,4 8,8.5 11,10" fill="none" stroke="#141313" stroke-width="1.2" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </div>
          <!-- 보통 3시간 이내 응답 fill=#59616b font=13/400 -->
          <div class="sub">보통 3시간 이내 응답</div>
        </div>
        <!-- Right Area: more icon -->
        <div class="right-area">
          <svg width="4" height="18" viewBox="0 0 4 18" fill="#141313">
            <circle cx="2" cy="2" r="1.6" />
            <circle cx="2" cy="9" r="1.6" />
            <circle cx="2" cy="16" r="1.6" />
          </svg>
        </div>
      </div>
    </div>

    <!-- Frame 2147224474 (상품바) 360x56, stroke bottom #F1F4F6, pad=[20,20], gap=12 -->
    <div class="productbar">
      <!-- image/item 32x32, r=4 -->
      <div class="thumb">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#AAA">
          <path
            d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" />
        </svg>
      </div>
      <!-- Frame 2147224475, VERTICAL gap=4 -->
      <div class="pinfo">
        <!-- product_name fill=#59616b font=13/400 -->
        <div class="pname">애플 아이폰12미니 MINI 실버 새상...</div>
        <!-- Frame 2147224476, HORIZONTAL cross=CENTER gap=4 -->
        <div class="price-row">
          <!-- product_price fill=#141313 font=15/700 -->
          <span class="price">880,000원</span>
          <!-- badge/goods fill=#efefef -> 무료배송 fill=#141313 font=11/500 -->
          <span class="ship-badge">무료배송</span>
        </div>
      </div>
      <!-- chips/suggestion fill=#000000 r=4 pad=[12,12] Chip="구매하기" fill=#ffffff font=13/600 -->
      <button class="buybtn">구매하기</button>
    </div>

    <!-- Banner/Floating 344x38, fill=#e4f8e8, stroke=#cbe8d1, r=8, pad=[16,16,10,10], gap=6 -->
    <div class="banner" id="trustBanner">
      <!-- icon/system/conerstone 16x16 fill=#009f1f r=16 -->
      <div class="dot">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="2.5 6 5 8.5 9.5 3.5" />
        </svg>
      </div>
      <!-- Group 723544 text -->
      <div class="txt"><span class="g">안심결제</span> <span class="d">쓰고 사기 걱정 없는 중고거래를 권장합니다.</span></div>
      <!-- icon/system/chevron_down 16x16, Shape fill=#009f1f -->
      <div class="chevron" onclick="document.getElementById('trustBanner').style.display='none'">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 6l4 4 4-4" stroke="#009F1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
    </div>

    <!-- 채팅 영역 (완전 빈 화면) -->
    <div class="chatarea" id="chatArea">
      <div class="msglist" id="msgList"></div>
    </div>

    <!-- 채팅 하단 퀵메뉴 360x32, HORIZONTAL, pad=[12,12], cross=CENTER, gap=4 -->
    <div class="qchips">
      <!-- chips/suggestion fill=#ffffff stroke=#dadee5 r=40, Chip font=12/500 fill=#141313 -->
      <div class="qc" onclick="sendQ(this)">안녕하세요</div>
      <div class="qc" onclick="sendQ(this)">📦 이 상품 관련 문의 드립니다</div>
      <div class="qc" onclick="sendQ(this)">지금 거래 되나요?</div>
    </div>

    <!-- CTA: Input/Chat 360x56, fill=#ffffff, HORIZONTAL, pad=[8,8,8,8], cross=CENTER -->
    <div class="inputarea">
      <!-- Touch Area 40x40: icon/system/plus_circle_outlined -->
      <div class="toucharea">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5"
          stroke-linecap="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="7" x2="12" y2="17" />
          <line x1="7" y1="12" x2="17" y2="12" />
        </svg>
      </div>
      <!-- InputBox 264x38, fill=#f1f4f6, r=25, pad=[16,8,10,10] -->
      <div class="inputwrap">
        <textarea class="inputbox" id="inp" rows="1" placeholder="대화를 해볼까요?" oninput="onI(this)"></textarea>
        <!-- Touch Area: icon/system/emoticon -->
        <div class="toucharea" style="width:28px;height:28px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5"
            stroke-linecap="round">
            <circle cx="12" cy="12" r="10" />
            <path d="M8 14s1.5 2 4 2 4-2 4-2" />
            <circle cx="9" cy="9" r=".8" fill="#9CA3AF" stroke="none" />
            <circle cx="15" cy="9" r=".8" fill="#9CA3AF" stroke="none" />
          </svg>
        </div>
      </div>
      <!-- Touch Area 40x40: icon/system/send 28x28
         Active: Shape=#ffffff(circle) + Union=#009f1f(arrow) → green arrow on white circle
         Inactive: ellipse=#dadee5 + Union fill=#ffffff → white arrow on gray circle -->
      <div class="toucharea">
        <button class="sendbtn active" id="sBtn" onclick="doS()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 12V2M3 6l4-4 4 4" stroke="#fff" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>
    </div>

    <!-- OS UI-Bottom Navigation 360x48: Navigation Bar -> .Navigation Bar/Icon/Recent + Home + Back -->
    <div class="bnav">
      <!-- Recent: 3 vertical bars -->
      <div class="ni">
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="#96A0AB" stroke-width="2"
          stroke-linecap="round">
          <line x1="3" y1="1" x2="3" y2="13" />
          <line x1="9" y1="1" x2="9" y2="13" />
          <line x1="15" y1="1" x2="15" y2="13" />
        </svg>
      </div>
      <!-- Home: rounded square -->
      <div class="ni">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#96A0AB" stroke-width="1.6">
          <rect x="1" y="1" width="14" height="14" rx="3" />
        </svg>
      </div>
      <!-- Back: chevron left -->
      <div class="ni">
        <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
          <path d="M9 1L1 9l8 8" stroke="#96A0AB" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
    </div>

  </div>

  <script>
    const inp = document.getElementById('inp'), sBtn = document.getElementById('sBtn'), ml = document.getElementById('msgList'), ca = document.getElementById('chatArea');
    function onI(e) {
      const hasText = e.value.trim().length > 0;
      sBtn.className = 'sendbtn ' + (hasText ? 'active' : 'active');
    }
    function doS() { const t = inp.value.trim(); if (!t) return; add(t, 's'); inp.value = ''; setTimeout(() => add('안녕하세요 😊 해당 상품 관련하여 문의해 주셨군요!', 'r'), 900) }
    function sendQ(e) { add(e.textContent, 's'); setTimeout(() => add('안녕하세요 😊 해당 상품 관련하여 문의해 주셨군요!', 'r'), 900) }
    function add(t, c) { const w = document.createElement('div'); w.className = 'bw ' + c; const b = document.createElement('div'); b.className = 'bb ' + c; b.textContent = t; w.appendChild(b); ml.appendChild(w); ca.scrollTop = ca.scrollHeight }
    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doS() } });
  </script>
